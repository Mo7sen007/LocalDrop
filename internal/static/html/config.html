<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalDrop - Config</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style type="text/tailwindcss">
        @layer base {
            body { @apply font-sans bg-slate-50 text-slate-900; }
        }
        @layer components {
            .font-display { font-family: "Press Start 2P", cursive; }
            .font-body { font-family: "Inter", system-ui, sans-serif; }

            .retro-card { @apply bg-white border-2 border-slate-900 rounded-xl overflow-hidden shadow-[6px_6px_0_0_#0f172a]; }
            .retro-card-sm { @apply bg-white border-2 border-slate-900 rounded-lg overflow-hidden shadow-[4px_4px_0_0_#0f172a]; }
            .retro-btn { @apply inline-flex items-center gap-2 border-2 border-slate-900 rounded-lg px-4 py-2 font-semibold bg-amber-300 shadow-[4px_4px_0_0_#0f172a] transition-transform duration-200 ease-out; }
            .retro-btn:hover { @apply -translate-x-0.5 -translate-y-0.5; }
            .retro-btn:active { @apply translate-x-0.5 translate-y-0.5 shadow-[2px_2px_0_0_#0f172a]; }
            .retro-btn.secondary { @apply bg-slate-200; }
            .retro-btn.primary { @apply bg-emerald-300; }
            .retro-btn.danger { @apply bg-rose-300; }
            .retro-input { @apply w-full border-2 border-slate-900 rounded-lg px-3 py-2 bg-white focus:outline-none focus:ring-4 focus:ring-slate-200 shadow-[3px_3px_0_0_#0f172a]; }
            .retro-input:focus { @apply -translate-x-0.5 -translate-y-0.5 shadow-[4px_4px_0_0_#0f172a]; }
            .retro-select { @apply w-full border-2 border-slate-900 rounded-lg px-3 py-2 bg-white focus:outline-none focus:ring-4 focus:ring-slate-200 shadow-[3px_3px_0_0_#0f172a]; }
            .retro-select:focus { @apply -translate-x-0.5 -translate-y-0.5 shadow-[4px_4px_0_0_#0f172a]; }
            .toggle { @apply inline-flex items-center gap-2 font-semibold; }
            .toggle input { @apply w-4 h-4; }
        }
    </style>
</head>
<body class="font-body bg-slate-50 text-slate-900">
    <header class="sticky top-0 z-40 bg-white border-b-2 border-slate-900 shadow-[0_4px_0_0_#0f172a]">
        <div class="max-w-6xl mx-auto px-6 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-folder-open text-2xl" aria-hidden="true"></i>
                <h1 class="font-display text-lg md:text-xl">LocalDrop</h1>
            </div>
            <nav class="flex flex-wrap items-center gap-3">
                <a href="/dashboard" class="nav-link retro-btn secondary">Dashboard</a>
                <a href="/download" class="nav-link retro-btn secondary">Files</a>
                <a href="/config" class="nav-link retro-btn secondary">Config</a>
                <button id="logoutBtn" class="logout-btn retro-btn danger">
                    <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
                    Logout
                </button>
            </nav>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-6 py-10">
        <div class="text-center mb-10">
            <h2 class="font-display text-xl md:text-2xl">Server Config</h2>
            <p class="page-description text-slate-600 mt-3">Update LocalDrop settings. Some changes require a restart.</p>
        </div>

        <div id="alert" class="hidden mb-6">
            <div class="retro-card-sm px-4 py-3 font-semibold" id="alertContent"></div>
        </div>

        <div class="retro-card">
            <div class="flex items-center justify-between px-6 py-4 border-b-2 border-slate-900 bg-slate-100">
                <h3 class="font-display text-sm">Configuration</h3>
                <i class="fa-solid fa-sliders" aria-hidden="true"></i>
            </div>
            <form id="configForm" class="p-6 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label for="port" class="text-sm font-semibold">Server Port</label>
                        <input type="number" id="port" min="1" max="65535" class="retro-input" required>
                        <p class="text-xs text-slate-600">Changing the port requires a restart.</p>
                    </div>
                    <div class="space-y-2">
                        <label for="maxSize" class="text-sm font-semibold">Max Upload Size (MB)</label>
                        <input type="number" id="maxSize" min="1" class="retro-input" required>
                        <p class="text-xs text-slate-600">Applied on restart for multipart limits.</p>
                    </div>
                </div>

                <div class="space-y-2">
                    <label for="basePath" class="text-sm font-semibold">Storage Base Path</label>
                    <input type="text" id="basePath" class="retro-input" required>
                    <p class="text-xs text-slate-600">Ensure the directory exists and is writable.</p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-semibold">Authentication</label>
                        <label class="toggle"><input type="checkbox" id="authEnabled">Enable login protection</label>
                        <p class="text-xs text-slate-600">When disabled, admin pages are public.</p>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold">Logging</label>
                        <label class="toggle"><input type="checkbox" id="loggingEnabled">Enable logging</label>
                        <div class="mt-3">
                            <label for="loggingLevel" class="text-sm font-semibold">Logging Level</label>
                            <select id="loggingLevel" class="retro-select">
                                <option value="debug">debug</option>
                                <option value="info">info</option>
                                <option value="warn">warn</option>
                                <option value="error">error</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="flex flex-wrap gap-3 justify-end">
                    <button type="button" id="resetBtn" class="retro-btn secondary">Reset</button>
                    <button type="submit" class="retro-btn primary">
                        <i class="fa-solid fa-floppy-disk" aria-hidden="true"></i>
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/config.js"></script>
</body>
</html>
