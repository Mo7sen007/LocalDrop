<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LocalDrop — Files</title><meta name="description" content="Download files shared on this LocalDrop instance. Browse, download, and share files securely."><meta name="robots" content="noindex, nofollow"><meta name="theme-color" content="#f8fafc"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap"><link rel="stylesheet" href="/css/main.css">
</head>
<body>
<main class="download-page">
    <header class="app-navbar" tinyfx-dynamic data-component="Navbar">
  <div class="navbar-inner">
    <div class="navbar-brand">
      <svg width="1em" height="1em" viewBox="0 0 576 512" fill="currentColor" aria-hidden="true" focusable="false"><path d="M88.7 223.8L0 375.8 0 96C0 60.7 28.7 32 64 32l117.5 0c17 0 33.3 6.7 45.3 18.7l26.5 26.5c12 12 28.3 18.7 45.3 18.7L416 96c35.3 0 64 28.7 64 64l0 32-336 0c-22.8 0-43.8 12.1-55.3 31.8zm27.6 16.1C122.1 230 132.6 224 144 224l400 0c11.5 0 22 6.1 27.7 16.1s5.7 22.2-.1 32.1l-112 192C453.9 474 443.4 480 432 480L32 480c-11.5 0-22-6.1-27.7-16.1s-5.7-22.2 .1-32.1l112-192z"/></svg>
      <h1>LocalDrop</h1>
    </div>
    <nav class="navbar-nav" data-nav-links>
      <a class="nav-link" id="loginBtn" href="/login" hidden>Login</a>
      <button class="nav-link danger" id="logoutBtn" hidden>
        <svg width="1em" height="1em" viewBox="0 0 512 512" fill="currentColor" aria-hidden="true" focusable="false"><path d="M502.6 278.6c12.5-12.5 12.5-32.8 0-45.3l-128-128c-12.5-12.5-32.8-12.5-45.3 0s-12.5 32.8 0 45.3L402.7 224 192 224c-17.7 0-32 14.3-32 32s14.3 32 32 32l210.7 0-73.4 73.4c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0l128-128zM160 96c17.7 0 32-14.3 32-32s-14.3-32-32-32L96 32C43 32 0 75 0 128L0 384c0 53 43 96 96 96l64 0c17.7 0 32-14.3 32-32s-14.3-32-32-32l-64 0c-17.7 0-32-14.3-32-32l0-256c0-17.7 14.3-32 32-32l64 0z"/></svg>
        Logout
      </button>
    </nav>
  </div>
</header>


    <div class="page-wrapper">
      <div class="content-area">
        <header class="page-header">
          <h2>Available Files</h2>
          <p class="page-description">Download files shared on this LocalDrop instance</p>
        </header>

        <section class="retro-card" aria-label="File list">
          <div class="card-header">
            <h3>File List</h3>
            <button class="retro-btn secondary" id="refreshBtn" aria-label="Refresh file list">
              <svg width="1em" height="1em" viewBox="0 0 512 512" fill="currentColor" aria-hidden="true" focusable="false" class="refresh-icon"><path d="M142.9 142.9c-17.5 17.5-30.1 38-37.8 59.8c-5.9 16.7-24.2 25.4-40.8 19.5s-25.4-24.2-19.5-40.8C55.6 150.7 73.2 122 97.6 97.6c87.2-87.2 228.3-87.5 315.8-1L455 55c6.9-6.9 17.2-8.9 26.2-5.2s14.8 12.5 14.8 22.2l0 128c0 13.3-10.7 24-24 24l-8.4 0c0 0 0 0 0 0L344 224c-9.7 0-18.5-5.8-22.2-14.8s-1.7-19.3 5.2-26.2l41.1-41.1c-62.6-61.5-163.1-61.2-225.3 1zM16 312c0-13.3 10.7-24 24-24l7.6 0 .7 0L168 288c9.7 0 18.5 5.8 22.2 14.8s1.7 19.3-5.2 26.2l-41.1 41.1c62.6 61.5 163.1 61.2 225.3-1c17.5-17.5 30.1-38 37.8-59.8c5.9-16.7 24.2-25.4 40.8-19.5s25.4 24.2 19.5 40.8c-10.8 30.6-28.4 59.3-52.9 83.8c-87.2 87.2-228.3 87.5-315.8 1L57 457c-6.9 6.9-17.2 8.9-26.2 5.2S16 449.7 16 440l0-119.6 0-.7 0-7.6z"/></svg>
              Refresh
            </button>
          </div>
          <div class="table-wrapper" style="content-visibility:auto;contain-intrinsic-size:0 300px">
            <table id="fileTable">
              <thead>
                <tr>
                  <th scope="col">Name</th>
                  <th scope="col">Size</th>
                  <th scope="col">Type</th>
                  <th scope="col">Actions</th>
                </tr>
              </thead>
              <tbody id="fileTableBody">
              </tbody>
            </table>
            <div id="loadingState" class="loading" role="status" aria-label="Loading files">
              <div class="loading-spinner" aria-hidden="true"></div>
              <p>Loading files...</p>
            </div>
            <div id="emptyState" class="empty-state" style="display:none">
              <div class="empty-icon" aria-hidden="true"><svg width="1em" height="1em" viewBox="0 0 384 512" fill="currentColor" focusable="false"><path d="M320 464c8.8 0 16-7.2 16-16l0-288-80 0c-17.7 0-32-14.3-32-32l0-80L64 48c-8.8 0-16 7.2-16 16l0 384c0 8.8 7.2 16 16 16l256 0zM0 64C0 28.7 28.7 0 64 0L229.5 0c17 0 33.3 6.7 45.3 18.7l90.5 90.5c12 12 18.7 28.3 18.7 45.3L384 448c0 35.3-28.7 64-64 64L64 512c-35.3 0-64-28.7-64-64L0 64z"/></svg></div>
              <h3>No files available</h3>
              <p>There are currently no files shared on this instance.</p>
            </div>
          </div>
        </section>
      </div>

      <div class="modal" tinyfx-dynamic role="dialog" aria-modal="true" aria-labelledby="pin-modal-title" data-component="PinModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="pin-modal-title">Enter PIN</h3>
      <button class="modal-close" data-action="close" aria-label="Close dialog">&times;</button>
    </div>
    <div class="modal-body">
      <p>This item is protected. Please enter the PIN:</p>
      <input type="password" class="retro-input pin-input" placeholder="Enter PIN" maxlength="10" data-pin-input aria-label="PIN code">
      <div class="modal-actions">
        <button class="retro-btn secondary" data-action="cancel">Cancel</button>
        <button class="retro-btn primary" data-action="submit">Download</button>
      </div>
    </div>
  </div>
</div>

      <div class="modal" tinyfx-dynamic role="dialog" aria-modal="true" aria-labelledby="share-modal-title" data-component="ShareModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="share-modal-title">Share</h3>
      <button class="modal-close" data-action="close" aria-label="Close dialog">&times;</button>
    </div>
    <div class="modal-body">
      <div class="qr-container" data-qr></div>
      <input class="retro-input share-url-input" readonly data-share-url aria-label="Share link URL">
      <div class="modal-actions">
        <button class="retro-btn secondary" data-action="copy">Copy Link</button>
        <button class="retro-btn primary" data-action="native-share">Share</button>
      </div>
    </div>
  </div>
</div>

      <div class="toast" tinyfx-dynamic role="status" aria-live="polite" aria-atomic="true" data-component="Toast">
  <div class="toast-content">
    <span class="toast-icon"></span>
    <span class="toast-message"></span>
  </div>
</div>

    </div>
  </main>
<script type="module" src="/js/main.js"></script>
</body>
</html>
