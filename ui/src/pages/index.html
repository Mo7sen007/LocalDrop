<page route="/" layout="">
  <div class="page-wrapper download-page">
    <Navbar
      links='[{"label":"Files","url":"/","active":true},{"label":"Dashboard","url":"/dashboard","active":false}]'
      show-logout="false"
    />

    <div class="content-area">
      <div class="page-header">
        <h2>Available Files</h2>
        <p class="page-description">Download files shared on this LocalDrop instance</p>
      </div>

      <div class="retro-card">
        <div class="card-header">
          <h3>File List</h3>
          <button class="retro-btn secondary" id="refreshBtn" aria-label="Refresh file list">
            <i class="fa-solid fa-rotate" aria-hidden="true"></i>
            Refresh
          </button>
        </div>
        <div class="table-wrapper" style="content-visibility:auto;contain-intrinsic-size:0 300px">
          <table id="fileTable">
            <thead>
              <tr>
                <th>Name</th>
                <th>Size</th>
                <th>Type</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="fileTableBody">
            </tbody>
          </table>
          <div id="loadingState" class="loading">
            <div class="loading-spinner"></div>
            <p>Loading files...</p>
          </div>
          <div id="emptyState" class="empty-state" style="display:none">
            <div class="empty-icon"><i class="fa-regular fa-file" aria-hidden="true"></i></div>
            <h3>No files available</h3>
            <p>There are currently no files shared on this instance.</p>
          </div>
        </div>
      </div>
    </div>

    <PinModal data-pin-modal />
    <ShareModal data-share-modal />
    <Toast data-toast />
  </div>
</page>
