<page route="/login" title="LocalDrop — Sign In">
  <head>
    <meta name="description" content="Sign in to your LocalDrop instance to manage and share files.">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#f8fafc">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700&display=swap">
  </head>
  <main class="login-page">
    <div class="login-card retro-card">
      <div class="login-header">
        <svg width="1em" height="1em" viewBox="0 0 576 512" fill="currentColor" aria-hidden="true" focusable="false"><path d="M88.7 223.8L0 375.8 0 96C0 60.7 28.7 32 64 32l117.5 0c17 0 33.3 6.7 45.3 18.7l26.5 26.5c12 12 28.3 18.7 45.3 18.7L416 96c35.3 0 64 28.7 64 64l0 32-336 0c-22.8 0-43.8 12.1-55.3 31.8zm27.6 16.1C122.1 230 132.6 224 144 224l400 0c11.5 0 22 6.1 27.7 16.1s5.7 22.2-.1 32.1l-112 192C453.9 474 443.4 480 432 480L32 480c-11.5 0-22-6.1-27.7-16.1s-5.7-22.2 .1-32.1l112-192z"/></svg>
        <div>
          <h1>LocalDrop</h1>
          <p>Sign in to continue</p>
        </div>
      </div>

      <form class="login-form" data-login-form aria-label="Sign in form">
        <div class="form-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" class="retro-input" placeholder="Enter your username" required data-username autocomplete="username" aria-required="true">
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" class="retro-input" placeholder="Enter your password" required data-password autocomplete="current-password" aria-required="true">
        </div>

        <button type="submit" class="login-btn retro-btn primary" data-login-submit>
          <span class="btn-text">Sign In</span>
          <span class="btn-spinner" style="display:none" aria-hidden="true"><svg width="1em" height="1em" viewBox="0 0 512 512" fill="currentColor" focusable="false"><path d="M304 48a48 48 0 1 0 -96 0 48 48 0 1 0 96 0zm0 416a48 48 0 1 0 -96 0 48 48 0 1 0 96 0zM48 304a48 48 0 1 0 0-96 48 48 0 1 0 0 96zm464-48a48 48 0 1 0 -96 0 48 48 0 1 0 96 0zM142.9 437A48 48 0 1 0 75 369.1 48 48 0 1 0 142.9 437zm0-294.2A48 48 0 1 0 75 75a48 48 0 1 0 67.9 67.9zM369.1 437A48 48 0 1 0 437 369.1 48 48 0 1 0 369.1 437z"/></svg></span>
        </button>
      </form>

      <div class="login-error" data-error-msg role="alert" aria-live="polite" aria-atomic="true"></div>
    </div>
  </main>
</page>
