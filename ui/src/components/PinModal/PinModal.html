<div class="modal" tinyfx-dynamic role="dialog" aria-modal="true" aria-labelledby="pin-modal-title">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="pin-modal-title">Enter PIN</h3>
      <button class="modal-close" data-action="close" aria-label="Close dialog">&times;</button>
    </div>
    <div class="modal-body">
      <p>This item is protected. Please enter the PIN:</p>
      <input type="password" class="retro-input pin-input" placeholder="Enter PIN" maxlength="10" data-pin-input aria-label="PIN code">
      <div class="modal-actions">
        <button class="retro-btn secondary" data-action="cancel">Cancel</button>
        <button class="retro-btn primary" data-action="submit">Download</button>
      </div>
    </div>
  </div>
</div>
